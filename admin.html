<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Studio 7 | Admin</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; padding: 40px; }
        .booking-tile { background: #161616; padding: 20px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .status-pending { color: #d4af37; font-weight: bold; }
        .status-confirmed { color: #2ecc71; font-weight: bold; }
        button { padding: 10px 15px; margin-left: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .approve { background: #2ecc71; color: white; }
        .deny { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <h1>Studio 7 Admin</h1>
    <div id="bookingList">Loading...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAD6aJV973blSKgMe8X-VUrqAw3yUYxYO8",
            authDomain: "studiobooking-b570c.firebaseapp.com",
            projectId: "studiobooking-b570c",
            storageBucket: "studiobooking-b570c.firebasestorage.app",
            messagingSenderId: "702140025097",
            appId: "1:702140025097:web:5361b4c69122857b8cabd8",
            measurementId: "G-P6FY9H6GMN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "bookings"), (snapshot) => {
            const list = document.getElementById('bookingList');
            list.innerHTML = '';
            snapshot.forEach((sb) => {
                const data = sb.data();
                const id = sb.id;
                const div = document.createElement('div');
                div.className = 'booking-tile';
                div.innerHTML = `
                    <div>
                        <strong>${data.customerName}</strong> (${data.customerEmail})<br>
                        ${data.bookingDate} @ ${data.startTime}<br>
                        Status: <span class="status-${data.status}">${data.status}</span>
                    </div>
                    <div>
                        <button class="approve" onclick="updateStatus('${id}', 'confirmed')">Approve</button>
                        <button class="deny" onclick="deleteBooking('${id}')">Delete</button>
                    </div>
                `;
                list.appendChild(div);
            });
        });

        window.updateStatus = async (id, status) => { await updateDoc(doc(db, "bookings", id), { status: status }); };
        window.deleteBooking = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "bookings", id)); };
    </script>
</body>
</html>
